name: Deploy to Dev.to

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Confirm secret exists
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: |
          if [ -z "$DEVTO_API_KEY" ]; then
            echo "DEVTO_API_KEY is not set"
            exit 1
          fi
          echo "DEVTO_API_KEY is set"
